<!DOCTYPE html>
<html>
<head>
    <title>AliExpress Scraper</title>
</head>
<body>

<h1>AliExpress Top 20 Scraper</h1>

<form method="POST">
    <select name="category">
        {% for category in categories %}
            <option value="{{category}}">{{category}}</option>
        {% endfor %}
    </select>
    <button type="submit">Scraper</button>
</form>

<hr>

{% if results %}
    <h2>Résultats</h2>
    <ul>
        {% for product in results %}
            <li>{{product.title}} - Orders détectées: {{product.orders_detected}}</li>
        {% endfor %}
    </ul>
{% endif %}

</body>
</html>
